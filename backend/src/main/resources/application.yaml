spring:
  application:
    name: forge
  datasource:
    # Defaults target the Dockerized Postgres (see docker-compose.yml) on localhost,
    # so the app runs from the IDE with `docker compose up -d db`. In the backend
    # container these are overridden by SPRING_DATASOURCE_* env vars.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/forge}
    username: ${SPRING_DATASOURCE_USERNAME:forge}
    password: ${SPRING_DATASOURCE_PASSWORD:forge}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; never let Hibernate alter it.
      ddl-auto: none
  flyway:
    enabled: true

app:
  jwt:
    # Dev default only — override with JWT_SECRET (min 32 bytes for HS256) in real environments.
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32b!}
    access-token-ttl: PT1H

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
